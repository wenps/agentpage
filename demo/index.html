<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPilot Demo - Interaction Lab</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e6e9ef;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #151923;
      border-bottom: 1px solid #2a3140;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .topbar h1 {
      margin: 0;
      font-size: 16px;
      color: #9fb4ff;
      margin-right: auto;
    }
    .topbar label { font-size: 12px; color: #a8b0c0; }
    .topbar input, .topbar select {
      background: #0f1320;
      border: 1px solid #313c50;
      color: #d7def0;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
    }
    #token { width: 280px; }
    .status { font-size: 12px; color: #84e1a1; }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 14px;
      padding-bottom: 280px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background: #141925;
      border: 1px solid #293246;
      border-radius: 12px;
      padding: 14px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #cdd7ff;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .row label {
      min-width: 88px;
      color: #aeb7cb;
      font-size: 12px;
    }
    .row input, .row textarea, .row select, .row button {
      background: #0f1320;
      border: 1px solid #313c50;
      color: #d7def0;
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 13px;
    }
    .row input, .row textarea, .row select { flex: 1; min-width: 180px; }
    .row textarea { min-height: 72px; resize: vertical; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .actions button {
      background: #2b3754;
      border: 1px solid #465982;
      color: #dfe7ff;
      border-radius: 7px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    .actions button.primary {
      background: #4f6fff;
      border-color: #4f6fff;
      color: #fff;
    }
    .hint { color: #8e98af; font-size: 12px; }

    .dropdown {
      position: relative;
      min-width: 220px;
      flex: 1;
    }
    .dropdown-menu {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      background: #111726;
      border: 1px solid #3b4a69;
      border-radius: 8px;
      padding: 4px;
      max-height: 180px;
      overflow: auto;
      z-index: 20;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-item {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #d5def8;
    }
    .dropdown-item:hover { background: #24314b; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 8px;
    }
    th, td {
      border-bottom: 1px solid #273044;
      padding: 8px;
      text-align: left;
    }
    th { color: #b9c6e8; }

    .toast {
      margin-top: 8px;
      font-size: 12px;
      color: #94ecad;
      display: none;
    }
    .toast.show { display: block; }

    .dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #121826;
      border-top: 1px solid #2d3750;
      max-height: 46vh;
      display: flex;
      flex-direction: column;
      z-index: 50;
    }
    .dock-toggle {
      text-align: center;
      font-size: 12px;
      color: #94a2c6;
      padding: 4px;
      cursor: pointer;
      background: #1a2133;
    }
    #chat {
      flex: 1;
      min-height: 120px;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 88%;
      padding: 8px 10px;
      border-radius: 9px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
    }
    .msg.user { align-self: flex-end; background: #2d3f76; }
    .msg.assistant { align-self: flex-start; background: #1b253e; }
    .msg.tool-call { align-self: flex-start; background: #173126; border-left: 3px solid #3ecf8e; }
    .msg.tool-result { align-self: flex-start; background: #1b2337; border-left: 3px solid #6687ff; }
    .msg.system { align-self: flex-start; background: #2b2c37; color: #b7bdd1; }
    .msg.error { align-self: flex-start; background: #432226; color: #ffc9c9; }

    .quick { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 10px; border-top: 1px solid #27314a; }
    .quick button {
      background: #1c2740;
      color: #c7d4ff;
      border: 1px solid #33456f;
      border-radius: 6px;
      font-size: 11px;
      padding: 5px 8px;
      cursor: pointer;
    }
    .input {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #27314a;
    }
    #input {
      flex: 1;
      background: #0f1320;
      border: 1px solid #313c50;
      color: #d7def0;
      border-radius: 7px;
      padding: 9px;
      font-size: 13px;
    }
    #send {
      background: #4f6fff;
      color: #fff;
      border: 0;
      border-radius: 7px;
      padding: 0 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>AutoPilot · Interaction Lab</h1>
    <span class="status" id="status">未连接</span>
    <label>Token</label>
    <input id="token" type="password" placeholder="DeepSeek Token" />
    <label>Model</label>
    <select id="model">
      <option value="deepseek-chat" selected>deepseek-chat</option>
      <option value="deepseek-reasoner">deepseek-reasoner</option>
    </select>
    <label>Stream</label>
    <select id="streamMode">
      <option value="stream">stream</option>
      <option value="json" selected>json</option>
    </select>
    <label>Dry-run</label>
    <input id="dryrun" type="checkbox" />
    <label>Memory</label>
    <input id="memory" type="checkbox" />
  </div>

  <main class="layout">
    <section class="card">
      <h2>交互 Demo：仓库创建（输入 / 下拉 / 单选 / 复选 / 提交）</h2>
      <div class="row">
        <label for="repoSearch">搜索</label>
        <input id="repoSearch" placeholder="输入关键词后按 Enter 过滤" />
      </div>
      <div class="row">
        <label for="repoName">仓库名称</label>
        <input id="repoName" placeholder="例如：my-awesome-repo" />
      </div>
      <div class="row">
        <label for="repoPath">仓库路径</label>
        <input id="repoPath" placeholder="例如：team/my-awesome-repo" />
      </div>
      <div class="row">
        <label for="repoDesc">描述</label>
        <textarea id="repoDesc" placeholder="可选描述"></textarea>
      </div>
      <div class="row">
        <label for="repoOwner">Owner</label>
        <select id="repoOwner">
          <option value="frontend">frontend</option>
          <option value="backend">backend</option>
          <option value="platform">platform</option>
        </select>
      </div>
      <div class="row">
        <label>可见性</label>
        <label><input type="radio" name="visibility" value="private" checked /> 私有</label>
        <label><input type="radio" name="visibility" value="internal" /> 内部公开</label>
        <label><input type="radio" name="visibility" value="public" /> 公开</label>
      </div>
      <div class="row">
        <label>模板类型</label>
        <div class="dropdown">
          <button type="button" id="tagDropdownTrigger">选择模板：<span id="selectedTag">Node</span></button>
          <div class="dropdown-menu" id="tagDropdownMenu">
            <div role="option" class="dropdown-item" data-value="Node">Node</div>
            <div role="option" class="dropdown-item" data-value="React">React</div>
            <div role="option" class="dropdown-item" data-value="Python">Python</div>
            <div role="option" class="dropdown-item" data-value="Go">Go</div>
          </div>
        </div>
      </div>
      <div class="row">
        <label>初始化</label>
        <label><input id="repoReadme" type="checkbox" /> 创建 README</label>
      </div>
      <div class="actions">
        <button id="openCreateModal">打开确认弹窗</button>
        <button class="primary" id="createRepoBtn">创建仓库</button>
        <span class="hint" id="formMessage">请先填写仓库名称。</span>
      </div>
      <div class="toast" id="toast">创建成功</div>
    </section>

    <section class="card">
      <h2>仓库列表（可用于 Enter 搜索、点击、删除）</h2>
      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>路径</th>
            <th>Owner</th>
            <th>可见性</th>
            <th>模板</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="repoTableBody"></tbody>
      </table>
    </section>
  </main>

  <div id="createModalMask" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;align-items:center;justify-content:center;">
    <div style="width:min(420px,90vw);background:#151b2b;border:1px solid #334160;border-radius:10px;padding:14px;">
      <h3 style="margin:0 0 10px;color:#cad6ff;font-size:14px;">确认创建仓库</h3>
      <p id="modalSummary" style="font-size:12px;color:#b2bdd8;line-height:1.6;"></p>
      <div class="actions" style="justify-content:flex-end;">
        <button id="cancelCreateModal">取消</button>
        <button class="primary" id="confirmCreateModal">确认创建</button>
      </div>
    </div>
  </div>

  <div class="dock" id="chatDock" data-autopilot-ignore>
    <div class="dock-toggle" id="chatDockToggle">▲ 聊天面板 ▲</div>
    <div id="chat"></div>
    <div class="quick">
      <button onclick="sendQuick('随便生成一个仓库名称填到仓库名称输入框')">填名称</button>
      <button onclick="sendQuick('把模板类型切到 React，然后勾选创建 README')">选模板</button>
      <button onclick="sendQuick('把可见性改为内部公开，然后点击创建仓库')">改可见性并创建</button>
      <button onclick="sendQuick('在搜索框输入 repo 然后按 Enter')">搜索并回车</button>
      <button onclick="clearHistory()">清空记忆</button>
    </div>
    <div class="input">
      <input id="input" placeholder="输入要执行的网页操作" />
      <button id="send">发送</button>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
