<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPilot Web Agent Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── 顶部栏 ─── */
    header {
      background: #1a1a2e;
      padding: 12px 20px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #7c83ff;
    }
    header .status {
      font-size: 12px;
      color: #666;
      margin-left: auto;
    }
    header .status.connected { color: #4caf50; }

    /* ─── 设置区 ─── */
    .settings {
      background: #141422;
      padding: 10px 20px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .settings label {
      font-size: 12px;
      color: #888;
    }
    .settings input, .settings select {
      background: #1e1e3a;
      border: 1px solid #333;
      color: #ddd;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .settings input[type="password"] { width: 280px; }

    /* ─── 聊天区 ─── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #2a2a6e;
      color: #e0e0ff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e1e32;
      color: #d0d0d0;
      border-bottom-left-radius: 4px;
    }
    .msg.tool-call {
      align-self: flex-start;
      background: #1a2e1a;
      color: #a0d0a0;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      border-left: 3px solid #4caf50;
    }
    .msg.tool-result {
      align-self: flex-start;
      background: #1a1a2e;
      color: #b0b0d0;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      border-left: 3px solid #7c83ff;
    }
    .msg.error {
      align-self: flex-start;
      background: #2e1a1a;
      color: #f08080;
      border-left: 3px solid #e74c3c;
    }
    .msg .label {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    /* ─── 输入区 ─── */
    .input-area {
      background: #1a1a2e;
      padding: 12px 20px;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      background: #0f0f1e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    #input:focus { border-color: #7c83ff; }
    #input::placeholder { color: #555; }

    #send {
      background: #7c83ff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    #send:hover { background: #6b72e8; }
    #send:disabled { background: #333; cursor: not-allowed; }

    /* ─── 测试面板 ─── */
    .test-panel {
      background: #141422;
      padding: 10px 20px;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .test-panel button {
      background: #1e1e3a;
      color: #aaa;
      border: 1px solid #333;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .test-panel button:hover { background: #2a2a4a; color: #ddd; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 AutoPilot Web Agent Demo</h1>
    <span class="status" id="status">未连接</span>
  </header>

  <div class="settings">
    <label>Token:</label>
    <input type="password" id="token" placeholder="GitHub Token (ghp_xxx...)" />
    <label>Model:</label>
    <select id="model">
      <option value="gpt-4o">gpt-4o</option>
      <option value="gpt-4o-mini">gpt-4o-mini</option>
      <option value="o3-mini">o3-mini</option>
    </select>
    <label>Dry-run:</label>
    <input type="checkbox" id="dryrun" />
    <label>记忆:</label>
    <input type="checkbox" id="memory" />
  </div>

  <div id="chat"></div>

  <div class="test-panel">
    <span style="color:#666;font-size:12px;line-height:28px;">快捷测试：</span>
    <button onclick="sendQuick('获取当前页面标题和URL')">📄 页面信息</button>
    <button onclick="sendQuick('获取页面DOM快照')">🌲 DOM快照</button>
    <button onclick="sendQuick('点击页面上的第一个按钮')">👆 点击按钮</button>
    <button onclick="sendQuick('获取页面上所有链接的文本')">🔗 所有链接</button>
    <button onclick="sendQuick('把页面滚动到底部')">⬇️ 滚动底部</button>
    <button onclick="sendQuick(`执行 document.querySelectorAll(\"*\").length 看看有多少DOM节点`)">📊 DOM计数</button>    
    <button onclick="clearHistory()">🗑️ 清空记忆</button>  </div>

  <div class="input-area">
    <input type="text" id="input" placeholder="输入指令，让 AI 操作当前页面..." />
    <button id="send">发送</button>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
